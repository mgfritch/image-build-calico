---
name: "Update BCI base version"

sources:
  bci:
    name: Get latest BCI base image digest
    kind: dockerdigest
    spec:
      image: "registry.suse.com/bci/bci-base"
      tag: "latest"

conditions:
  bci-image:
    name: Check BCI base image exists
    kind: dockerimage
    sourceid: bci
    spec:
      image: registry.suse.com/bci/bci-base
      architecture: amd64
      tag: '{{ source "bci" }}'

targets:
  dockerfile:
    name: "Update BCI base image tag"
    kind: dockerfile
    sourceid: bci
    transformers:
      - addprefix: "registry.suse.com/bci/bci-base:"
    spec:
      file: "Dockerfile"
      instruction:
        keyword: "ARG"
        matcher: "BCI_IMAGE"
scms:
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ requiredEnv .github.username }}'
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ requiredEnv "GITHUB_REPOSITORY_OWNER" }}'
      repository: '{{ requiredEnv "UPDATECLI_GITHUB_REPO" }}'
      branch: '{{ requiredEnv "UPDATECLI_GITHUB_BRANCH" }}'
actions:
  default:
    title: 'Bump BCI base image version'
    kind: github/pullrequest
    spec:
      labels:
        - chore
        - skip-changelog
        - status/auto-created
      merge:
        strategy: auto
    scmid: default
